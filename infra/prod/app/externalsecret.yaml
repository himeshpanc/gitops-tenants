# Pulls the greeting from OpenBao into a K8s Secret the pod reads.
# The PR repoints spec.data[0].remoteRef.key to the new versioned path — so prod
# only serves the new version once the PR merges (the gate).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: podinfo-greeting
  namespace: infra-prod
spec:
  refreshInterval: 15s
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: podinfo-greeting
    creationPolicy: Owner
  data:
    - secretKey: message
      remoteRef:
        key: infra-prod-6.29.0
        property: greeting
