# Pulls the greeting from OpenBao into a K8s Secret the pod reads.
# Kargo's yaml-update repoints spec.data[0].remoteRef.key to the new versioned
# path each promotion — that repoint (in git) is what selects the served version.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: podinfo-greeting
  namespace: infra-demo
spec:
  refreshInterval: 15s
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: podinfo-greeting
    creationPolicy: Owner
  data:
    - secretKey: message
      remoteRef:
        key: infra-demo-6.27.0
        property: greeting
