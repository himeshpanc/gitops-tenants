# tofu-controller runner RBAC + the tenant Terraform CRs — reconciled from Git.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tf-runner
  namespace: flux-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tf-runner
rules:
  - apiGroups: [""]
    resources: ["namespaces", "configmaps", "services", "secrets", "serviceaccounts"]
    verbs: ["*"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["*"]
  - apiGroups: ["external-secrets.io"]
    resources: ["externalsecrets", "secretstores"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tf-runner
subjects:
  - kind: ServiceAccount
    name: tf-runner
    namespace: flux-system
roleRef:
  kind: ClusterRole
  name: tf-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: infra.contrib.fluxcd.io/v1alpha2
kind: Terraform
metadata:
  name: tenant-canary-tf
  namespace: flux-system
spec:
  interval: 1m
  approvePlan: auto
  path: ./tf/tenants/canary
  serviceAccountName: tf-runner
  sourceRef:
    kind: GitRepository
    name: gitops-tenants
    namespace: flux-system
  writeOutputsToSecret:
    name: tenant-canary-tf-outputs
---
apiVersion: infra.contrib.fluxcd.io/v1alpha2
kind: Terraform
metadata:
  name: tenant-prod-tf
  namespace: flux-system
spec:
  interval: 1m
  approvePlan: auto
  path: ./tf/tenants/prod
  serviceAccountName: tf-runner
  sourceRef:
    kind: GitRepository
    name: gitops-tenants
    namespace: flux-system
  writeOutputsToSecret:
    name: tenant-prod-tf-outputs
