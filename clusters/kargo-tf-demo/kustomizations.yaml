# Flux Kustomizations reconciled from Git by the root "cluster-config"
# Kustomization (app-of-apps). Only the shared platform track lives here; the
# infra-demo/prod and fleet (tenant-a/b/c) Kustomizations are applied directly.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-addons
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: gitops-tenants
  path: ./platform/addons
  prune: true
  wait: true
  timeout: 6m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-config
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: platform-addons
  sourceRef:
    kind: GitRepository
    name: gitops-tenants
  path: ./platform/config
  prune: true
