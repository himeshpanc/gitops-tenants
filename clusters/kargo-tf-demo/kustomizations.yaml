# Flux Kustomizations for both delivery tracks — reconciled from Git by the
# root "cluster-config" Kustomization (app-of-apps).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tenant-canary
  namespace: flux-system
spec:
  interval: 20s
  sourceRef:
    kind: GitRepository
    name: gitops-tenants
  path: ./tenants/canary
  prune: true
  wait: true
  timeout: 2m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tenant-prod
  namespace: flux-system
spec:
  interval: 20s
  sourceRef:
    kind: GitRepository
    name: gitops-tenants
  path: ./tenants/prod
  prune: true
  wait: true
  timeout: 2m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-addons
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: gitops-tenants
  path: ./platform/addons
  prune: true
  wait: true
  timeout: 6m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-config
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: platform-addons
  sourceRef:
    kind: GitRepository
    name: gitops-tenants
  path: ./platform/config
  prune: true
