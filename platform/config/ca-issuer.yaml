# Self-signed root -> a CA cert -> a CA ClusterIssuer, so every tenant Certificate
# chains to one stable demo CA (issuer CN=demo-ca). Needs cert-manager ready first
# (guaranteed: platform-config dependsOn platform-addons with wait: true).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: demo-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: demo-ca
  secretName: demo-ca-tls
  privateKey: { algorithm: ECDSA, size: 256 }
  issuerRef: { name: selfsigned, kind: ClusterIssuer, group: cert-manager.io }
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: demo-ca-issuer
spec:
  ca:
    secretName: demo-ca-tls
