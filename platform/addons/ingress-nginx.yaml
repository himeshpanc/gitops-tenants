# Shared addon — routes per-tenant Ingress. ClusterIP (no cloud LB in k3d);
# watchIngressWithoutClass so it also picks up default-class Ingresses.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: ingress-nginx
  install:
    createNamespace: true
  chart:
    spec:
      chart: ingress-nginx
      version: "4.15.1"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
  values:
    controller:
      service:
        type: ClusterIP
      watchIngressWithoutClass: true
