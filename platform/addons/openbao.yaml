apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openbao
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: openbao
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: openbao
      version: "0.28.4"
      sourceRef:
        kind: HelmRepository
        name: openbao
        namespace: flux-system
  values:
    # DEV MODE — demo only (in-memory, unsealed, root token). Not for production.
    server:
      dev:
        enabled: true
        devRootToken: root
