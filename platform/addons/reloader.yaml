apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reloader
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: reloader
  install:
    createNamespace: true
  chart:
    spec:
      chart: reloader
      version: "2.2.12"
      sourceRef:
        kind: HelmRepository
        name: stakater
        namespace: flux-system
